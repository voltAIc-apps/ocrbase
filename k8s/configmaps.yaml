apiVersion: v1
kind: ConfigMap
metadata:
  name: paddleocr-config
  namespace: ocrbase
data:
  vllm_config.yaml: |
    model: PaddlePaddle/PaddleOCR-VL-2B
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.8
    max_model_len: 4096
    trust_remote_code: true

  pipeline_config_vllm.yaml: |
    Global:
      model_dir: null
      device: gpu
      use_vllm: true
      vllm_config:
        base_url: http://paddleocr-vlm:8000/v1
        model: PaddlePaddle/PaddleOCR-VL-2B
        timeout: 120

    PreProcessor:
      - ResizeImage:
          resize_short: 960
          keep_ratio: true
      - NormalizeImage:
          scale: 1./255.
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
          order: hwc
      - ToCHWImage:

    PostProcessor:
      - OCRPostProcessor:
