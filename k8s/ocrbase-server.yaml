apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocrbase-server
  namespace: ocrbase
  labels:
    app: ocrbase-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocrbase-server
  template:
    metadata:
      labels:
        app: ocrbase-server
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: ocrbase-server
          image: crepo.re-cloud.io/voltaic/ocrbase:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llmhub-credentials
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://llm_user:$(DB_PASSWORD)@llmhub-db.llmhub.svc:5432/ocrbase"
            - name: REDIS_URL
              value: "redis://llmhub-redis.llmhub.svc:6379/1"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ocrbase-secrets
                  key: BETTER_AUTH_SECRET
            - name: BETTER_AUTH_URL
              value: "https://pdf2json.simplify-erp.de"
            - name: CORS_ORIGINS
              value: "https://pdf2json.simplify-erp.de"
            - name: PADDLE_OCR_URL
              value: "http://paddleocr-api:8080"
            - name: S3_ENDPOINT
              value: "http://llmhub-minio.llmhub.svc:9000"
            - name: S3_BUCKET
              value: "ocrbase"
            - name: S3_ACCESS_KEY
              value: "minioadmin"
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: llmhub-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: LLM_BASE_URL
              value: "http://open-webui-ollama.open-webui.svc.cluster.local:11434/v1"
            - name: LLM_MODEL
              value: "llama3.1:8b"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ocrbase-server
  namespace: ocrbase
spec:
  selector:
    app: ocrbase-server
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
