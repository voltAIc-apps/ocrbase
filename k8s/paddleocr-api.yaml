apiVersion: apps/v1
kind: Deployment
metadata:
  name: paddleocr-api
  namespace: ocrbase
  labels:
    app: paddleocr-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paddleocr-api
  template:
    metadata:
      labels:
        app: paddleocr-api
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: chat.voltaic.systems
      containers:
        - name: paddleocr-api
          image: ccr-2vdh3abv-pub.cnc.bj.baidubce.com/paddlepaddle/paddleocr-vl:latest-nvidia-gpu
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PADDLE_OCR_USE_GPU
              value: "true"
            - name: VLLM_BASE_URL
              value: "http://paddleocr-vlm:8000/v1"
            - name: VLLM_MODEL
              value: "PaddlePaddle/PaddleOCR-VL-2B"
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
            limits:
              memory: "8Gi"
              cpu: "2"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: config
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: config
          configMap:
            name: paddleocr-config
---
apiVersion: v1
kind: Service
metadata:
  name: paddleocr-api
  namespace: ocrbase
spec:
  selector:
    app: paddleocr-api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
